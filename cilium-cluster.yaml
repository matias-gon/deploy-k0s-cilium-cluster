# k0sctl-cilium-config.yaml - k0s cluster with Cilium CNI
apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: k0s-cilium-cluster
spec:
  hosts:
    - ssh:
        address: 10.252.231.196
        user: ubuntu
        keyPath: ~/.ssh/cilium-k0s
      role: controller
    - ssh:
        address: 10.252.231.56
        user: ubuntu
        keyPath: ~/.ssh/cilium-k0s
      role: worker
    - ssh:
        address: 10.252.231.195
        user: ubuntu
        keyPath: ~/.ssh/cilium-k0s
      role: worker
  k0s:
    version: "v1.34.5+k0s.0"
    dynamicConfig: false
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s-cilium-cluster
      spec:
        # Disable kube-proxy since Cilium will replace it
        network:
          # Use Cilium as the CNI provider
          provider: custom
          podCIDR: 10.244.0.0/16
          serviceCIDR: 10.96.0.0/12
          kubeProxy:
            disabled: true
        # Deploy Cilium as a k0s add-on
        extensions:
          helm:
            repositories:
              - name: cilium
                url: https://helm.cilium.io/
            charts:
              - name: cilium
                chartname: cilium/cilium
                version: "1.19.3"
                namespace: kube-system
                values: |
                  ipam:
                    mode: kubernetes
                  kubeProxyReplacement: true
                  k8sServiceHost: 10.252.231.196
                  k8sServicePort: "6443"
                  hubble:
                    relay:
                      enabled: true
                    ui:
                      enabled: true
                  prometheus:
                    enabled: true
